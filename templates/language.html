<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedApple – Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked { right: 0; border-color: #2E7D32; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2E7D32; }
        .suggestion-item:hover { background-color: #E8F5E9; cursor: pointer; }
        .btn-disabled { background-color: #D1D5DB; cursor: not-allowed; color: #9CA3AF; pointer-events: none; }
        .btn-active { background-color: #2E7D32; cursor: pointer; color: white; transform: scale(1.02); box-shadow: 0 4px 14px rgba(46, 125, 50, 0.4); }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased" onclick="initAudio()">

    <div id="role-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-all">
        <div class="modal-content bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 scale-95 border-t-8 border-[#2E7D32] transition-transform">
            <h2 class="text-2xl font-bold text-[#2E7D32] text-center mb-2">Who are you?</h2>
            <div class="space-y-4 mt-8">
                <button onclick="redirectToAuth('farmer')" class="w-full py-4 bg-[#F1F8F1] hover:bg-[#2E7D32] hover:text-white text-[#2E7D32] font-bold rounded-2xl transition-all">I am a Farmer</button>
                <button onclick="redirectToAuth('consumer')" class="w-full py-4 bg-[#F1F8F1] hover:bg-[#2E7D32] hover:text-white text-[#2E7D32] font-bold rounded-2xl transition-all">I am a Consumer</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 text-gray-400 text-xs underline">Go back</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-6 min-h-screen flex flex-col">
        <header class="flex items-center space-x-3 pb-6 border-b border-[#E8F5E9]">
            <div class="w-12 h-12 bg-[#2E7D32] rounded-full flex items-center justify-center text-white text-2xl shadow-sm">🌱</div>
            <div>
                <h1 data-i18n="app_title" class="text-2xl font-bold text-[#2E7D32] leading-none">RedApple</h1>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Decentralized Agriculture</p>
            </div>
        </header>

        <main class="mt-10 flex-grow">
            <div class="mb-10 relative">
                <label data-i18n="search_label" class="block text-[#2E7D32] font-semibold mb-3 text-lg">Select Your Language:</label>
                <input type="text" id="language-search" placeholder="Search (Hindi, Marathi, etc.)..." 
                       class="w-full p-6 text-xl border-2 border-[#E8F5E9] rounded-3xl focus:border-[#2E7D32] outline-none transition-all shadow-sm">
                <div id="suggestions" class="absolute z-10 w-full bg-white border border-gray-200 rounded-2xl mt-2 shadow-2xl hidden overflow-hidden"></div>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
                <button class="lang-btn bg-[#F1F8F1] text-[#2E7D32] font-bold py-5 rounded-2xl hover:bg-[#2E7D32] hover:text-white transition-all" data-lang="hi">हिन्दी</button>
                <button class="lang-btn bg-[#F1F8F1] text-[#2E7D32] font-bold py-5 rounded-2xl hover:bg-[#2E7D32] hover:text-white transition-all" data-lang="mr">मराठी</button>
                <button class="lang-btn bg-[#F1F8F1] text-[#2E7D32] font-bold py-5 rounded-2xl hover:bg-[#2E7D32] hover:text-white transition-all" data-lang="en">English</button>
            </div>

            <div class="mt-16 text-center">
                <button id="proceed-btn" disabled class="btn-disabled w-full sm:w-96 py-6 rounded-3xl font-black text-2xl transition-all shadow-xl uppercase">PROCEED</button>
                <p class="text-gray-400 mt-4 italic text-sm" id="selection-status">Please select a language to enable the marketplace.</p>
            </div>
        </main>

        <div class="fixed bottom-6 right-6 bg-white rounded-3xl p-5 w-72 border border-[#E8F5E9] shadow-2xl">
            <div class="flex items-center justify-between">
                <span data-i18n="ai_label" class="font-bold text-[#2E7D32]">Voice Assistant</span>
                <div class="relative inline-block w-12 align-middle">
                    <input type="checkbox" id="voiceToggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-[#E8F5E9] checked:border-[#2E7D32] right-6 transition" />
                    <label for="voiceToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition"></label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: { app_title: "RedApple", search_label: "Select your language:", ai_label: "Voice Assistant", status: "Language set to English. Ready!" },
            hi: { app_title: "एग्रीफ्लो", search_label: "अपनी भाषा चुनें:", ai_label: "आवाज सहायक", status: "भाषा हिन्दी पर सेट है। तैयार!" },
            mr: { app_title: "एग्रीफ्लो", search_label: "तुमची भाषा निवडा:", ai_label: "व्हॉइस सहाय्यक", status: "भाषा मराठीवर सेट केली आहे!" }
        };

        const languages = [
            { name: "Hindi", native: "हिन्दी", code: "hi" },
            { name: "Marathi", native: "मराठी", code: "mr" },
            { name: "English", native: "English", code: "en" }
        ];

        let selectedLangCode = 'en';
        let audioStarted = false;
        const voiceToggle = document.getElementById('voiceToggle');
        const proceedBtn = document.getElementById('proceed-btn');
        const modal = document.getElementById('role-modal');

        // --- AUDIO ENGINE ---
        // Path matches your static folder welcome.mp4
        const welcomeAudio = new Audio("{{ url_for('static', filename='welcome.mp4') }}");
        welcomeAudio.loop = true;

        // Automatically attempts to play on the very first click the user makes
        function initAudio() {
            if (!audioStarted && voiceToggle.checked) {
                welcomeAudio.play()
                    .then(() => { audioStarted = true; })
                    .catch(e => { console.log("Still waiting for stronger interaction..."); });
            }
        }

        function stopVoiceLoop() {
            welcomeAudio.pause();
            welcomeAudio.currentTime = 0;
        }

        // --- SELECTION ENGINE ---
        function activateSelection(langObj) {
            selectedLangCode = langObj.code;
            stopVoiceLoop(); // End loop when user makes a choice
            voiceToggle.checked = false;

            const data = translations[langObj.code] || translations['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = data[el.getAttribute('data-i18n')]);

            proceedBtn.disabled = false;
            proceedBtn.className = "btn-active w-full sm:w-96 py-6 rounded-3xl font-black text-2xl transition-all shadow-xl uppercase";
            
            document.getElementById('selection-status').innerText = data.status;
            document.getElementById('language-search').value = langObj.native;
            document.getElementById('suggestions').classList.add('hidden');
        }

        // --- LISTENERS ---
        document.getElementById('language-search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const box = document.getElementById('suggestions');
            box.innerHTML = '';
            if (!val) { box.classList.add('hidden'); return; }
            
            const filtered = languages.filter(l => l.name.toLowerCase().includes(val) || l.native.toLowerCase().includes(val));
            if (filtered.length > 0) {
                box.classList.remove('hidden');
                filtered.forEach(lang => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item p-5 border-b border-gray-100 last:border-0 font-bold';
                    div.innerHTML = `${lang.native} <span class="text-gray-300 text-xs italic ml-2">${lang.name}</span>`;
                    div.onclick = () => activateSelection(lang);
                    box.appendChild(div);
                });
            }
        });

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.onclick = () => activateSelection(languages.find(l => l.code === btn.getAttribute('data-lang')));
        });

        proceedBtn.onclick = () => {
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('.modal-content').classList.remove('scale-95');
            modal.querySelector('.modal-content').classList.add('scale-100');
        };

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('.modal-content').classList.add('scale-95');
        }

        function redirectToAuth(role) {
            window.location.href = `/login?lang=${selectedLangCode}&role=${role}`;
        }

        voiceToggle.addEventListener('change', () => {
            if (voiceToggle.checked) {
                welcomeAudio.play();
                audioStarted = true;
            } else {
                welcomeAudio.pause();
            }
        });
    </script>
</body>
</html>
