<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisan Connect – Secure Payment</title>
    <!-- Ethers.js v6 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
       
        /* ===== CSS will be placed here (see separate CSS section) ===== */
        /* ----- Agricultural Green Theme ----- */
:root {
    --primary-dark: #2E7D32;      /* Deep green */
    --primary-darker: #1F5E3A;    /* Forest */
    --background-light: #E8F5E9;   /* Mint */
    --card-bg: #F1F8F1;            /* Off-white with green tint */
    --shadow: 0 12px 28px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
    --border-radius: 28px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

body {
    background: linear-gradient(145deg, var(--background-light) 0%, #c8e6c9 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
}

/* Centered card – SaaS style */
.payment-container {
    width: 100%;
    max-width: 480px;
    margin: auto;
}

.payment-card {
    background: var(--card-bg);
    backdrop-filter: blur(2px);
    border-radius: var(--border-radius);
    padding: 2rem 1.8rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(46, 125, 50, 0.15);
    transition: transform 0.2s ease;
}

.payment-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 32px rgba(30, 70, 40, 0.12);
}

.card-title {
    color: var(--primary-darker);
    font-weight: 600;
    font-size: 1.8rem;
    margin-bottom: 1.8rem;
    letter-spacing: -0.01em;
    border-left: 6px solid var(--primary-dark);
    padding-left: 1rem;
}

/* Order summary */
.order-summary {
    background: white;
    border-radius: 20px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 4px 12px rgba(46,125,50,0.08);
}

.summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 0;
    border-bottom: 1px dashed rgba(46, 125, 50, 0.2);
}

.summary-item:last-child {
    border-bottom: none;
}

.item-label {
    color: #2d4f2d;
    font-weight: 500;
    opacity: 0.8;
}

.item-value {
    font-weight: 600;
    color: var(--primary-darker);
    background: var(--background-light);
    padding: 0.2rem 1rem;
    border-radius: 40px;
    font-size: 0.95rem;
}

.highlight .item-value {
    background: var(--primary-dark);
    color: white;
    font-weight: 600;
}

/* Buttons */
.payment-actions {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.5rem;
}

.btn {
    border: none;
    padding: 1rem 1.5rem;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    letter-spacing: 0.3px;
}

.btn-primary {
    background: white;
    color: var(--primary-darker);
    border: 2px solid var(--primary-dark);
}

.btn-primary:hover:not(:disabled) {
    background: var(--background-light);
    transform: scale(1.01);
}

.btn-success {
    background: var(--primary-dark);
    color: white;
}

.btn-success:hover:not(:disabled) {
    background: var(--primary-darker);
    transform: scale(1.02);
    box-shadow: 0 8px 18px rgba(46, 125, 50, 0.3);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(0.2);
}

/* Status & transaction hash */
.status {
    margin: 1.2rem 0 0.8rem;
    padding: 0.8rem 1.2rem;
    border-radius: 50px;
    font-size: 0.95rem;
    text-align: center;
    font-weight: 500;
    background: #e0f2e0;
    color: #1f5e3a;
    border-left: 4px solid var(--primary-dark);
    word-break: break-word;
}

.tx-info {
    text-align: center;
    font-size: 0.9rem;
}

.tx-info a {
    color: var(--primary-darker);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 2px dotted var(--primary-dark);
}

.tx-info a:hover {
    color: var(--primary-dark);
}

/* Responsive */
@media (max-width: 480px) {
    .payment-card {
        padding: 1.5rem 1.2rem;
    }
    .card-title {
        font-size: 1.5rem;
    }
    .summary-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.3rem;
    }
    .item-value {
        width: 100%;
        text-align: center;
    }
}
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-card">
            <!-- Order Summary -->
            <h2 class="card-title">🌾 Complete Payment</h2>
            <div class="order-summary">
                <div class="summary-item">
                    <span class="item-label">Product</span>
                    <span class="item-value">{{ product_name }}</span>
                </div>
                <div class="summary-item">
                    <span class="item-label">Farmer</span>
                    <span class="item-value">{{ farmer_name }}</span>
                </div>
                <div class="summary-item">
                    <span class="item-label">Order ID</span>
                    <span class="item-value">#{{ order_id }}</span>
                </div>
                <div class="summary-item highlight">
                    <span class="item-label">Total (ETH)</span>
                    <span class="item-value">{{ amount_eth }} ETH</span>
                </div>
            </div>

            <!-- Wallet Connection & Payment -->
            <div class="payment-actions">
                <button id="connectBtn" class="btn btn-primary">🔌 Connect Wallet</button>
                <button id="payBtn" class="btn btn-success" disabled>💸 Pay with MetaMask</button>
            </div>

            <!-- Status & Transaction Info -->
            <div id="statusMessage" class="status"></div>
            <div id="txInfo" class="tx-info"></div>
        </div>
    </div>

    <script>
        // ===== JavaScript will be placed here (see separate JS section) =====

        // ===== BLOCKCHAIN PAYMENT LOGIC (Ethers.js v6) =====
document.addEventListener('DOMContentLoaded', () => {
    // ----- Jinja2 variables injected from Flask -----
    const orderId = "{{ order_id }}";
    const farmerWallet = "{{ farmer_wallet }}";
    const amountEth = parseFloat("{{ amount_eth }}");         // e.g., "0.05"
    const productName = "{{ product_name }}";
    const farmerName = "{{ farmer_name }}";

    // ----- Placeholders (replace with actual deployed contract) -----
    const CONTRACT_ADDRESS = "0x0759310b796Fa9188B8d1CF65c95A8641B57859c";   // TODO: replace
    const CONTRACT_ABI = [                                  // TODO: replace with full ABI
        "function payFarmer(string orderId, address farmer) payable"
    ];

    // ----- DOM elements -----
    const connectBtn = document.getElementById('connectBtn');
    const payBtn = document.getElementById('payBtn');
    const statusDiv = document.getElementById('statusMessage');
    const txInfoDiv = document.getElementById('txInfo');

    // ----- State -----
    let provider, signer, userAddress;
    let contract;

    // ----- Helper: update status -----
    function setStatus(msg, isError = false) {
        statusDiv.textContent = msg;
        statusDiv.style.background = isError ? '#ffebee' : '#e0f2e0';
        statusDiv.style.color = isError ? '#b71c1c' : '#1f5e3a';
    }

    // ----- Helper: clear transaction info -----
    function clearTxInfo() {
        txInfoDiv.innerHTML = '';
    }

    // ----- 1. Connect Wallet & check network -----
    async function connectWallet() {
        if (!window.ethereum) {
            setStatus('❌ MetaMask not installed. Please install it.', true);
            return;
        }

        try {
            setStatus('⏳ Connecting wallet...');
            provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send("eth_requestAccounts", []); // request access
            signer = await provider.getSigner();
            userAddress = await signer.getAddress();

            // Check if we are on Sepolia
            const network = await provider.getNetwork();
            const chainId = Number(network.chainId); // ethers v6 returns bigint, convert

            if (chainId !== 11155111) { // Sepolia chainId
                setStatus('⚠️ Wrong network! Switch to Sepolia.', true);
                try {
                    // Request switch to Sepolia
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0xaa36a7' }], // 11155111 in hex
                    });
                } catch (switchError) {
                    // If Sepolia not added, prompt to add
                    if (switchError.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: '0xaa36a7',
                                chainName: 'Sepolia Testnet',
                                nativeCurrency: { name: 'SepoliaETH', symbol: 'ETH', decimals: 18 },
                                rpcUrls: ['https://sepolia.infura.io/v3/'],
                                blockExplorerUrls: ['https://sepolia.etherscan.io/']
                            }]
                        });
                    } else {
                        throw switchError;
                    }
                }
                // Re-check network after switch
                const newNetwork = await provider.getNetwork();
                if (Number(newNetwork.chainId) !== 11155111) {
                    throw new Error('Still not on Sepolia. Please switch manually.');
                }
                setStatus('✅ Network switched to Sepolia.');
            } else {
                setStatus('✅ Connected to Sepolia.');
            }

            // Initialize contract instance
            contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

            // Enable pay button
            payBtn.disabled = false;
            connectBtn.textContent = '✅ Wallet Connected';
        } catch (error) {
            console.error(error);
            setStatus(`❌ Connection failed: ${error.message}`, true);
            payBtn.disabled = true;
        }
    }

    // ----- 2. Pay with MetaMask -----
    async function payWithMetaMask() {
        if (!contract || !signer) {
            setStatus('⚠️ Connect wallet first.', true);
            return;
        }

        try {
            setStatus('⏳ Sending transaction...');
            clearTxInfo();
            payBtn.disabled = true; // prevent double-click

            // Parse amount (in ETH) to wei
            const valueInWei = ethers.parseEther(amountEth.toString());

            // Call contract method: payFarmer(string orderId, address farmer)
            const tx = await contract.payFarmer(orderId, farmerWallet, {
                value: valueInWei
            });

            setStatus('⏳ Waiting for confirmation...');

            // Wait for 1 confirmation
            const receipt = await tx.wait();

            // Transaction hash
            const txHash = receipt.hash;

            // Display link
            txInfoDiv.innerHTML = `
                ✅ Payment successful!<br>
                <a href="https://sepolia.etherscan.io/tx/${txHash}" target="_blank">
                    🔍 View on Etherscan
                </a>
            `;
            setStatus('🎉 Transaction confirmed!');

            // ----- Send hash to Flask backend (/save-transaction) -----
            try {
                const response = await fetch('/save-transaction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        order_id: orderId,
                        tx_hash: txHash,
                        customer_wallet: userAddress,
                        amount: amountEth
                    })
                });
                if (!response.ok) {
                    console.error('Backend save failed');
                } else {
                    console.log('Transaction saved on server');
                }
            } catch (err) {
                console.error('Error saving transaction:', err);
            }

        } catch (error) {
            console.error(error);
            setStatus(`❌ Payment failed: ${error.message}`, true);
            payBtn.disabled = false; // re-enable on error
        }
    }

    // ----- Event listeners -----
    connectBtn.addEventListener('click', connectWallet);
    payBtn.addEventListener('click', payWithMetaMask);
});
    </script>
</body>
</html>
