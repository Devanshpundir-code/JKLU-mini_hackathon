<!DOCTYPE html>
<html lang="en">
<head>
    <title>Market Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/market.css') }}">
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #E8F5E9;
    margin: 0;
    padding: 0;
}

.container {
    width: 60%;
    margin: 50px auto;
    text-align: center;
}

h2 {
    color: #1F5E3A;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    margin-top: 20px;
}

.demand.high {
    color: green;
    font-weight: bold;
}

.demand.medium {
    color: orange;
    font-weight: bold;
}

.demand.low {
    color: red;
    font-weight: bold;
}

.actions {
    margin-top: 20px;
}

button {
    background-color: #2E7D32;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background-color: #1F5E3A;
}

.back-btn {
    margin-left: 15px;
    text-decoration: none;
    color: #2E7D32;
    font-weight: bold;
}

.insight-box {
    margin-top: 20px;
    padding: 15px;
    background: #F1F8F1;
    border-left: 4px solid #2E7D32;
    display: none;
}

.demand-bar {
    width: 100%;
    height: 10px;
    background: #ddd;
    border-radius: 5px;
    margin-top: 8px;
    overflow: hidden;
}

.fill {
    height: 100%;
    transition: width 0.5s ease-in-out;
}

.fill.high {
    width: 90%;
    background: #2E7D32;
}

.fill.medium {
    width: 60%;
    background: orange;
}

.fill.low {
    width: 30%;
    background: red;
}
</style>
</head>
<body>

<div class="container">
    <h2>📊 Market Intelligence - {{ crop }} ({{ state }})</h2>

    <div class="card">
        <p><strong>Platform Average Price:</strong> ₹{{ platform_avg }}</p>
        <p><strong>State Mandi Average:</strong> ₹{{ mandi_avg }}</p>
        <p><strong>Demand Level:</strong> 
            <span class="demand {{ demand|lower }}">{{ demand }}</span>
        </p>
        <div class="demand-bar">
    <div class="fill {{ demand|lower }}"></div>
</div>
        <p><strong>Suggested Selling Price:</strong> ₹{{ suggested }}</p>
        <p><strong>Market Gap:</strong> ₹{{ gap }}</p>
    </div>

    <div class="actions">
        <button onclick="showInsight()">Get AI Insight</button>
        <a href="/farmer" class="back-btn">⬅ Back to Dashboard</a>
    </div>

    <div id="aiInsight" class="insight-box"></div>
</div>
<script src="{{ url_for('static', filename='js/market.js') }}"></script>
<script>
    function showInsight() {
    const box = document.getElementById("aiInsight");
    box.style.display = "block";
    box.innerHTML = "💡 Based on current market trends, adjusting your price closer to mandi average may increase profitability while staying competitive.";
}
</script>
</body>
</html>
