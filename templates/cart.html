<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout · agriFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; }
        .form-input { 
            width: 100%; 
            background: #f1f5f9; 
            border: 1px solid #e2e8f0; 
            padding: 12px 16px; 
            border-radius: 12px; 
            outline: none; 
            transition: all 0.2s;
        }
        .form-input:focus { 
            border-color: #15803d; 
            background: white; 
            box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.1); 
        }
    </style>
</head>
<body>

<div class="container mx-auto max-w-7xl px-6 py-10">
    <nav class="flex items-center justify-between mb-12">
        <a href="/consumer" class="flex items-center gap-2 text-[#15803d] font-bold hover:underline">
            <i class="fas fa-arrow-left"></i> Back to Marketplace
        </a>
        <div class="flex items-center gap-2">
            <i class="fas fa-leaf text-2xl text-[#15803d]"></i>
            <span class="text-xl font-black italic tracking-tighter text-[#15803d]">RedApple</span>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Logged in as</p>
            <p class="text-sm font-bold text-gray-800">{{ name }}</p>
        </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2 space-y-8">
            
            <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-3">
                    <i class="fas fa-shopping-basket text-[#15803d]"></i> Review Your Items
                </h2>
                <div id="cartItemsList" class="divide-y divide-slate-100">
                    </div>
            </div>

            <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-3">
                    <i class="fas fa-map-marked-alt text-[#15803d]"></i> Detailed Delivery Address
                </h2>
                <form id="addressForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Full Name</label>
                        <input type="text" id="shipName" class="form-input mt-1" placeholder="Receiver's Name" value="{{ name }}">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">House / Flat / Office No.</label>
                        <input type="text" id="shipHouse" class="form-input mt-1" placeholder="e.g. Flat 402, Green Villa">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Street / Colony Name</label>
                        <input type="text" id="shipStreet" class="form-input mt-1" placeholder="e.g. MG Road, Sector 4">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Landmark</label>
                        <input type="text" id="shipLandmark" class="form-input mt-1" placeholder="e.g. Near City Hospital">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Pincode</label>
                        <input type="number" id="shipPincode" class="form-input mt-1" placeholder="6-digit Pincode">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">City</label>
                        <input type="text" id="shipCity" class="form-input mt-1" placeholder="City">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">State</label>
                        <select id="shipState" class="form-input mt-1">
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Punjab">Punjab</option>
                            <option value="Karnataka">Karnataka</option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100 sticky top-10">
                <h3 class="text-xl font-black mb-6">Order Summary</h3>
                <div class="space-y-4 border-b border-slate-100 pb-6 mb-6">
                    <div class="flex justify-between text-gray-500 font-medium">
                        <span>Items Total</span>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="flex justify-between text-gray-500 font-medium">
                        <span>Delivery Fee</span>
                        <span class="text-green-600 font-bold">FREE</span>
                    </div>
                    <div class="flex justify-between text-gray-500 font-medium">
                        <span>Platform Fee</span>
                        <span>₹0.00</span>
                    </div>
                </div>
                <div class="flex justify-between text-2xl font-black text-[#15803d] mb-8">
                    <span>Total Amount</span>
                    <span id="totalPrice">₹0.00</span>
                </div>
                
                <button id="proceedToPay" class="w-full bg-[#15803d] text-white py-5 rounded-2xl font-bold text-lg hover:bg-[#166534] transition-all shadow-lg shadow-green-900/10 active:scale-95">
                    Confirm & Proceed to Pay
                </button>
                
                <p class="text-[10px] text-center text-gray-400 mt-6 font-medium">
                    <i class="fas fa-shield-alt mr-1"></i> Secure payment processed via agriFlow Protocol
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // Load existing cart from browser storage
    let cart = JSON.parse(localStorage.getItem('agriFlowCart')) || [];

    function renderCart() {
        const container = document.getElementById('cartItemsList');
        const subtotalEl = document.getElementById('subtotal');
        const totalEl = document.getElementById('totalPrice');

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="py-10 text-center text-gray-400 font-medium">
                    Your cart is empty. <br> 
                    <a href="/consumer" class="text-[#15803d] font-bold underline">Go back to Marketplace</a>
                </div>`;
            subtotalEl.innerText = `₹0.00`;
            totalEl.innerText = `₹0.00`;
            return;
        }

        let total = 0;
        container.innerHTML = cart.map(item => {
            const itemTotal = item.price * item.cartQty;
            total += itemTotal;
            return `
                <div class="flex items-center gap-6 py-6">
                    <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-100">
                        ${item.img ? `<img src="/static/uploads/${item.img}" class="w-full h-full object-cover">` : '<i class="fas fa-seedling text-gray-300 text-3xl"></i>'}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800">${item.name}</h4>
                        <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">Farmer: ${item.farmer}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-gray-800">₹${itemTotal}</p>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${item.cartQty} KG @ ₹${item.price}</p>
                        <button onclick="removeItem(${item.id})" class="text-red-500 text-[10px] font-black hover:underline mt-1 uppercase">Remove</button>
                    </div>
                </div>
            `;
        }).join('');

        subtotalEl.innerText = `₹${total}`;
        totalEl.innerText = `₹${total}`;
    }

    // Function to remove items from cart
    window.removeItem = function(id) {
        cart = cart.filter(item => item.id !== id);
        localStorage.setItem('agriFlowCart', JSON.stringify(cart));
        renderCart();
    }

    // Handle Payment Button
    document.getElementById('proceedToPay').addEventListener('click', async () => {
    const house = document.getElementById('shipHouse').value.trim();
    const street = document.getElementById('shipStreet').value.trim();
    const pincode = document.getElementById('shipPincode').value.trim();

    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    if (!house || !street || !pincode) {
        alert("Please provide full delivery address.");
        return;
    }

    try {
        const response = await fetch('/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart: cart })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.removeItem('agriFlowCart');
            window.location.href = `/payment/${data.order_id}`;
        } else {
            alert(data.error || "Error creating order");
        }

    } catch (error) {
        console.error(error);
        alert("Server error while creating order.");
    }
});

    // Initial Render
    renderCart();
</script>

</body>
</html>
